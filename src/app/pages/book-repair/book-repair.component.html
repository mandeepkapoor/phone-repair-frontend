<div class="container">
  <h1>Book Your Repair</h1>
  <p class="subtitle">Takes less than 2 minutes</p>

  <form [formGroup]="form" (ngSubmit)="submit()">

    <label>Full Name</label>
    <input type="text" formControlName="name" placeholder="John Doe" />

    <label>Phone Number (WhatsApp)</label>
    <input type="tel" formControlName="phone" placeholder="+447XXXXXXXXX" />

    <label>Email Address</label>
    <input type="email" formControlName="email" placeholder="you@example.com" />

    <label>Pickup Address</label>
    <input
      type="text"
      #addressInput
      formControlName="address"
      placeholder="Start typing your postcode or address"
    />

    <label>Additional Notes (optional)</label>
    <textarea formControlName="notes" placeholder="Describe the issue briefly"></textarea>

    <button type="submit" [disabled]="form.invalid">
      Request Repair
    </button>
  </form>

  <p class="note">
    We’ll contact you via WhatsApp, SMS or email to confirm collection and payment.
  </p>
</div>
