<div class="container">
  <h1>Book Your Repair</h1>
  <p class="subtitle">Takes less than 2 minutes</p>

  <form [formGroup]="form" (ngSubmit)="submit()">

    <!-- NAME -->
    <label>Full Name</label>
    <input type="text" formControlName="name" />

    <label>Phone Number</label>

    <div class="phone-row">
      <span class="prefix">+44</span>
      <input
        type="text"
        formControlName="phone"
        placeholder="7XXXXXXXXX"
      />
    </div>

    <!-- ERROR -->
    <div *ngIf="form.get('phone')?.invalid && form.get('phone')?.touched">
      <small class="error">
        Enter a valid UK number (10 digits)
      </small>
    </div>

    <!-- EMAIL -->
    <label>Email</label>
    <input type="email" formControlName="email" />

    <!--EMAIL ERRROR-->
    <div *ngIf="form.get('email')?.invalid && form.get('email')?.touched">
      <small class="error">
        Enter a valid email address
      </small>
    </div>

    <!-- POSTCODE -->
    <label>Enter Postcode</label>
    <div class="postcode-row">
      <input type="text" formControlName="postcode" placeholder="e.g. TW8 9AG" />
      <button type="button" (click)="searchPostcode()">Find</button>
    </div>

    <!-- LOADING -->
    <p *ngIf="loading">Searching...</p>

    <!-- ERROR -->
    <p class="error" *ngIf="error">{{ error }}</p>

    <!-- ADDRESS DROPDOWN -->
    <div *ngIf="addresses.length > 0">
      <label>Select Address</label>
      <select (change)="onAddressChange($event)">
        <option value="">Select address</option>
        <option *ngFor="let addr of addresses" [value]="addr">
          {{ addr }}
        </option>
      </select>
    </div>

    <!-- FINAL ADDRESS -->
    <label>Full Address</label>
    <textarea formControlName="address"></textarea>

    <!-- NOTES -->
    <label>Repair Details</label>
    <textarea
      formControlName="notes"
      placeholder="Describe the issue (e.g. cracked screen, battery draining, etc.)">
    </textarea>

    <div *ngIf="form.get('notes')?.invalid && form.get('notes')?.touched">
      <small class="error">
        Please describe what needs repairing
      </small>
    </div>

    <button type="submit" [disabled]="form.invalid || isSubmitting">
      {{ isSubmitting ? 'Sending...' : 'Request Repair' }}
    </button>

  </form>

  <p class="note">
    We’ll contact you via WhatsApp, SMS or email to confirm collection and payment.
  </p>
</div>
